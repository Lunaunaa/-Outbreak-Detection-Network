<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hospital Outbreak Detection Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/paho-mqtt@1.1.0/paho-mqtt-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{--cyan:#00FFFF;--magenta:#FF00FF;--red:#FF0033;--bg:#000000;--yellow:#FFD24D;--grid:rgba(255,255,255,0.02)}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--cyan);font-family:'DM Mono',monospace}
    .app{display:grid;grid-template-columns:20% 60% 20%;grid-template-rows:1fr 260px;gap:12px;padding:12px;height:100vh;box-sizing:border-box}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:10px;padding:12px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.03)}
    .left-controls{display:flex;flex-direction:column;gap:8px}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--cyan);padding:8px;border-radius:6px;cursor:pointer}
    .btn-danger{background:linear-gradient(90deg,var(--red),#ff5577);color:white;border:none}
    .small{font-size:12px;color:rgba(255,255,255,0.6)}
    #floor-wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
    svg{width:100%;height:100%;display:block}
    canvas{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
    .grid-overlay{position:absolute;left:0;top:0;width:100%;height:100%;background-image:linear-gradient(0deg,var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
    .metrics{display:flex;flex-direction:column;gap:10px}
    .metric-big{font-size:36px;font-weight:700;text-shadow:0 0 8px rgba(0,255,255,0.5)}
    .zone-list{max-height:200px;overflow:auto;display:flex;flex-direction:column;gap:6px}
    .bottom-row{grid-column:1/-1;display:grid;grid-template-columns:1fr 380px;gap:12px}
    .chart-card{height:100%;padding:8px}
    .timeline{height:100%;overflow:auto;font-size:12px;color:rgba(255,255,255,0.9);display:flex;flex-direction:column;gap:6px;padding:6px}
    .pulse-flash{animation:flash-red 0.7s ease-in-out 3}
    @keyframes flash-red{0%{box-shadow:0 0 0 0 rgba(255,0,51,0)}50%{box-shadow:0 0 48px 12px rgba(255,0,51,0.25)}100%{box-shadow:0 0 0 0 rgba(255,0,51,0)}}
  </style>
</head>
<body>
  <div class="app">
    <div class="panel left-controls">
      <div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700">Controls</div><div id="mqtt-dot" style="width:12px;height:12px;border-radius:50%;background:#600;color:#000"></div></div>
      <div style="display:flex;gap:8px"><button class="btn" id="playPause">Pause</button><button class="btn" id="reset">Reset</button></div>
      <div><label class="small">Speed: <span id="speedLabel">1.0x</span></label><input id="speed" type="range" min="0.5" max="2" step="0.1" value="1"></div>
      <div><label class="small">Transmission rate: <span id="trLabel">3%</span></label><input id="transRate" type="range" min="1" max="10" step="0.5" value="3"></div>
      <div><button class="btn" id="inject">Contamination Inject</button></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="zoneBtns"></div>
      <div style="border-top:1px dashed rgba(255,255,255,0.03);padding-top:8px;margin-top:8px">
        <div class="small">Toggles</div>
        <label><input type="checkbox" id="toggleEdges" checked> Edges</label><br>
        <label><input type="checkbox" id="toggleTrails" checked> Trails</label><br>
        <label><input type="checkbox" id="toggleHeat" checked> Heatmap</label><br>
        <label><input type="checkbox" id="togglePulse" checked> Pulse Rings</label>
      </div>
      <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:center"><div class="small">Theme</div><select id="themeSel"><option>Dark</option><option>Light</option></select></div>
    </div>

    <div class="panel" id="centerPanel">
      <div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700">ICU Floor Map + Graph</div><div class="small" id="connStatus">Connecting...</div></div>
      <div id="floor-wrap">
        <svg id="floorSvg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <rect id="zone-ICU" x="40" y="40" width="360" height="240" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="220" y="160" fill="#00FFFF" text-anchor="middle" font-size="20">ICU</text>
          <rect id="zone-Emergency" x="440" y="40" width="360" height="240" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="620" y="160" fill="#00FFFF" text-anchor="middle" font-size="20">Emergency</text>
          <rect id="zone-WardA" x="40" y="320" width="360" height="180" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="220" y="420" fill="#00FFFF" text-anchor="middle" font-size="20">Ward A</text>
          <rect id="zone-WardB" x="440" y="320" width="360" height="180" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="620" y="420" fill="#00FFFF" text-anchor="middle" font-size="20">Ward B</text>
          <rect id="zone-Lab" x="860" y="40" width="280" height="240" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="1000" y="160" fill="#00FFFF" text-anchor="middle" font-size="20">Lab</text>
          <rect id="zone-OR" x="860" y="320" width="280" height="180" fill="#071018" stroke="#0aa" stroke-width="2"/>
          <text x="1000" y="420" fill="#00FFFF" text-anchor="middle" font-size="20">OR</text>
        </svg>
        <canvas id="heatCanvas"></canvas>
        <canvas id="entityCanvas"></canvas>
        <div class="grid-overlay"></div>
      </div>
    </div>

    <div class="panel metrics" id="rightPanel">
      <div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700">Metrics</div><div class="small" id="simTime">00:00:00</div></div>
      <div><div class="small">Current Infections</div><div id="currentInfections" class="metric-big" style="color:var(--red)">0</div></div>
      <div style="display:flex;gap:8px"><div style="flex:1"><div class="small">Total Recovered</div><div id="totalRecovered" style="color:limegreen;font-weight:700">0</div></div><div style="width:120px"><div class="small">R-value</div><div id="rVal" style="color:var(--cyan);font-weight:700">0.00</div></div></div>
      <div><div class="small">Hospital Capacity</div><div style="background:rgba(255,255,255,0.03);height:18px;border-radius:9px"><div id="capBar" style="height:100%;width:40%;background:linear-gradient(90deg,var(--yellow),#ffb84d)"></div></div></div>
      <div style="border-top:1px dashed rgba(255,255,255,0.03);padding-top:8px;margin-top:8px"><div class="small">Alert Status</div><div id="alertStatus" class="btn">System Normal</div></div>
      <div style="border-top:1px dashed rgba(255,255,255,0.03);padding-top:8px;margin-top:8px"><div class="small">Zone Breakdown</div><div id="zoneBreak" class="zone-list"></div></div>
      <div style="border-top:1px dashed rgba(255,255,255,0.03);padding-top:8px;margin-top:8px"><div class="small">Isolation Recommendations</div><div id="isoRec" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div></div>
    </div>

    <div class="panel bottom-row" style="grid-column:1/-1;grid-row:2/3">
      <div class="panel chart-card"><div style="font-weight:700">Infection Curve (24h)</div><canvas id="chart"></canvas></div>
      <div class="panel"><div style="font-weight:700">Transmission Timeline</div><div id="timeline" class="timeline"></div></div>
    </div>
  </div>

<script>
/* Dashboard JS implementing MQTT connection, rendering, charts, controls */
const ZONES=['ICU','Emergency','WardA','WardB','Lab','OR'];
const zoneRects={ICU:{x:40,y:40,w:360,h:240},Emergency:{x:440,y:40,w:360,h:240},WardA:{x:40,y:320,w:360,h:180},WardB:{x:440,y:320,w:360,h:180},Lab:{x:860,y:40,w:280,h:240},OR:{x:860,y:320,w:280,h:180}};
const COLORS={cyan:'#00FFFF',magenta:'#FF00FF',red:'#FF0033',yellow:'#FFD24D',sus:'#66b2ff',gray:'#888'};
let state={entities:{},contacts:[],timeline:[],infected:0,recovered:0,r:0,capacity:55,simSec:0,paused:false,speed:1,transRate:3,showEdges:true,showTrails:true,showHeat:true,showPulse:true,quarantined:new Set(),dpChains:null,algoLast:null,fpsSamples:[]};

/* Canvas setup */
const floorWrap=document.getElementById('floor-wrap');
const heatCanvas=document.getElementById('heatCanvas');const entityCanvas=document.getElementById('entityCanvas');
const heatCtx=heatCanvas.getContext('2d'), entCtx=entityCanvas.getContext('2d');
function resize(){const r=floorWrap.getBoundingClientRect();[heatCanvas,entityCanvas].forEach(c=>{c.width=r.width;c.height=r.height;c.style.width=r.width+'px';c.style.height=r.height+'px'});}window.addEventListener('resize',resize);resize();
function toCanvasCoords(x,y){const vbW=1200,vbH=720;const rect=floorWrap.getBoundingClientRect();return {x:(x/vbW)*rect.width,y:(y/vbH)*rect.height};}
function zoneRectToCanvas(z){const r=zoneRects[z];if(!r) return null;const a=toCanvasCoords(r.x,r.y);const b=toCanvasCoords(r.x+r.w,r.y+r.h);return {x:a.x,y:a.y,w:b.x-a.x,h:b.y-a.y};}

/* MQTT */
let mqttClient=null;let mqttConnected=false;function connectMQTT(host='localhost',port=1883){const clientId='dash-'+Math.random().toString(16).slice(2,10);try{mqttClient=new Paho.MQTT.Client(host,Number(port),clientId);mqttClient.onConnectionLost=()=>{mqttConnected=false;updateConn(false)};mqttClient.onMessageArrived=m=>{handleMsg(m.destinationName,m.payloadString)};mqttClient.connect({onSuccess:()=>{mqttConnected=true;updateConn(true);subscribe();},onFailure:(e)=>{console.warn('MQTT fail',e);updateConn(false)}});}catch(e){console.warn(e);updateConn(false)}}
function subscribe(){if(!mqttClient) return;['icu/sensor/#','icu/contact/#','icu/alert/#'].forEach(t=>mqttClient.subscribe(t));}
function handleMsg(topic,payload){if(state.paused) return;try{const p=JSON.parse(payload);const parts=topic.split('/');if(parts[1]==='sensor'){if(Array.isArray(p.entities)){p.entities.forEach(e=>upsertEntity(e,parts[2]||'ICU'));}}else if(parts[1]==='contact'){if(Array.isArray(p)) p.forEach(c=>processContact(c,parts[2]||'ICU'));else processContact(p,parts[2]||'ICU')}else if(parts[1]==='alert'){handleAlgorithm(p);} }catch(e){console.warn('parse',e)} }
function updateConn(ok){document.getElementById('connStatus').innerText = ok? 'Connected':'Disconnected';document.getElementById('mqtt-dot').style.background = ok? 'limegreen':'#600';}

/* Entities */
function upsertEntity(e,zone){const id=e.id||('p'+Math.random().toString(16).slice(2,6));if(!state.entities[id]){const pos=randomInZone(zone);state.entities[id]={id,type:e.type||'patient',status:e.status||'susceptible',zone, x: e.x? mapZoneToSvgX(zone,e.x):pos.x, y: e.y? mapZoneToSvgY(zone,e.y):pos.y, trail:[],target:null,pulse:0}}else{const ent=state.entities[id];ent.type=e.type||ent.type;ent.status=e.status||ent.status;ent.zone=zone;ent.last=Date.now();}}
function mapZoneToSvgX(zone,relx){const r=zoneRects[zone]||zoneRects.ICU;return r.x+clamp(relx,0,1)*r.w}
function mapZoneToSvgY(zone,rely){const r=zoneRects[zone]||zoneRects.ICU;return r.y+clamp(rely,0,1)*r.h}
function randomInZone(zone){const r=zoneRects[zone]||zoneRects.ICU;return {x:r.x+Math.random()*r.w,y:r.y+Math.random()*r.h}}
function ensureEntity(id,type,zone){if(!state.entities[id]){const pos=randomInZone(zone||'ICU');state.entities[id]={id,type:type||'patient',status:'susceptible',zone:zone||'ICU',x:pos.x,y:pos.y,trail:[],target:null,pulse:0};}return state.entities[id];}

/* Contacts */
function processContact(c,zone){const edge={a:c.a||c.from||c.source,b:c.b||c.to||c.target,duration:c.duration||1,prob:c.probability!=null?c.probability:(c.p||Math.random()),zone,t:Date.now()};ensureEntity(edge.a,'patient',zone);ensureEntity(edge.b,'staff',zone);state.contacts.push(edge);if(state.contacts.length>1200) state.contacts.shift();state.timeline.unshift({t:Date.now(),text:`[${new Date().toLocaleTimeString()}] ${edge.a} → ${edge.b} in ${zone} (${Math.round(edge.prob*100)}%)`,zone});if(state.timeline.length>20) state.timeline.pop(); // possible transmission
const a=state.entities[edge.a], b=state.entities[edge.b];const threshold = state.transRate/100; if(a && b && a.status==='infected' && b.status!=='infected' && Math.random() < threshold*edge.prob){b.status='infected';b.pulse=1;state.infected++; state.timeline.unshift({t:Date.now(),text:`Transmission: ${edge.a} → ${edge.b} (${Math.round(edge.prob*100)}%)`,zone}); if(state.timeline.length>20) state.timeline.pop(); triggerParticles(b); recomputeR();}}

/* Algorithm alert handling */
function handleAlgorithm(msg){state.algoLast=msg; // show BFS cluster
if(msg.exposure_cluster){Object.keys(msg.exposure_cluster).forEach(id=>{ensureEntity(id,'patient','ICU').highlight={color:'orange',since:Date.now()}})}state.dpChains=msg.transmission_chains||null; if(msg.isolation_zones) applyIsolation(msg.isolation_zones); flashAlert(); recomputeR();}
function applyIsolation(zones){zones.forEach(z=>state.quarantined.add(z));renderZoneButtons(); renderIsoRec(); highlightZones(zones);}function highlightZones(zones){zones.forEach(z=>{const el=document.getElementById('zone-'+z);if(el){el.setAttribute('stroke','#FF0033');el.setAttribute('stroke-width','4');setTimeout(()=>{el.setAttribute('stroke','#0aa');el.setAttribute('stroke-width','2');},4000)}})}
function flashAlert(){const root=document.querySelector('.app');root.classList.add('pulse-flash');setTimeout(()=>root.classList.remove('pulse-flash'),2300)}

/* Rendering */
let lastTs=performance.now();function loop(ts){const dt=(ts-lastTs)/1000;lastTs=ts;state.simSec+=dt*state.speed;updateUI();render();requestAnimationFrame(loop);}requestAnimationFrame(loop);
function updateUI(){document.getElementById('simTime').innerText = new Date(Math.floor(state.simSec*1000)).toISOString().substr(11,8);document.getElementById('currentInfections').innerText = Object.values(state.entities).filter(e=>e.status==='infected').length;document.getElementById('totalRecovered').innerText = Object.values(state.entities).filter(e=>e.status==='recovered').length;document.getElementById('rVal').innerText = state.r.toFixed(2);document.getElementById('capBar').style.width = state.capacity+'%';updateAlertUI();renderTimeline();renderZoneBreakdown();}
function render(){entCtx.clearRect(0,0,entityCanvas.width,entityCanvas.height);if(state.showHeat) renderHeat(); if(state.showEdges) drawEdges(); drawEntities(); if(state.dpChains) drawDPChains();}
function renderHeat(){heatCtx.clearRect(0,0,heatCanvas.width,heatCanvas.height);Object.keys(zoneRects).forEach(z=>{const rc=zoneRectToCanvas(z);if(!rc) return;const stats=zoneStats(z);const pct=stats.total? stats.infected/stats.total:0;const g=heatCtx.createLinearGradient(rc.x,rc.y,rc.x+rc.w,rc.y+rc.h);g.addColorStop(0,'#0000FF');g.addColorStop(0.25,COLORS.cyan);g.addColorStop(0.5,'#FFFF66');g.addColorStop(0.75,'#FF9933');g.addColorStop(0.9,COLORS.red);heatCtx.globalAlpha = 0.15 + pct*0.8;heatCtx.fillStyle=g;heatCtx.fillRect(rc.x,rc.y,rc.w,rc.h);heatCtx.globalAlpha=1;heatCtx.fillStyle='rgba(0,0,0,0.7)';heatCtx.font='bold 12px DM Mono';heatCtx.fillText(Math.round(pct*100)+'%', rc.x+6, rc.y+16);});}
function drawEdges(){const top = state.contacts.slice().sort((a,b)=>b.duration-a.duration).slice(0,5);top.forEach(e=>{const A=state.entities[e.a],B=state.entities[e.b];if(!A||!B) return;const pA=toCanvas(A.x,A.y), pB=toCanvas(B.x,B.y);entCtx.beginPath();entCtx.moveTo(pA.x,pA.y);entCtx.lineTo(pB.x,pB.y);entCtx.strokeStyle = lerpColor('#00FF00',COLORS.red,e.prob);entCtx.lineWidth = clamp(e.duration/2,1,6);entCtx.globalAlpha=0.9;entCtx.stroke();entCtx.globalAlpha=1;});}
function drawDPChains(){entCtx.save();Object.keys(state.dpChains||{}).forEach(target=>{const path=state.dpChains[target];if(!Array.isArray(path)) return;entCtx.strokeStyle=COLORS.magenta;entCtx.lineWidth=4;entCtx.beginPath();path.forEach((id,i)=>{const ent=state.entities[id];if(!ent) return;const p=toCanvas(ent.x,ent.y);if(i===0) entCtx.moveTo(p.x,p.y);else entCtx.lineTo(p.x,p.y)});entCtx.stroke();});entCtx.restore();}
function drawEntities(){Object.values(state.entities).forEach(ent=>{const p=toCanvas(ent.x,ent.y); // update movement
 if(ent.type==='staff') moveToward(ent,getPatrolTarget(ent),2.5*state.speed); else moveToward(ent,randomStay(ent),1*state.speed);
 // trails
 if(state.showTrails){ent.trail = ent.trail||[];ent.trail.unshift({x:ent.x,y:ent.y,t:Date.now()}); if(ent.trail.length>60) ent.trail.pop(); // draw
 entCtx.beginPath(); for(let i=0;i<ent.trail.length;i++){const t=ent.trail[i];const q=toCanvas(t.x,t.y); if(i===0) entCtx.moveTo(q.x,q.y); else entCtx.lineTo(q.x,q.y);} entCtx.strokeStyle = ent.status==='infected' ? 'rgba(255,0,51,0.3)':'rgba(255,255,255,0.06)'; entCtx.lineWidth=2; entCtx.stroke(); }
 // core
 entCtx.beginPath(); entCtx.fillStyle = ent.status==='infected'? COLORS.red : (ent.type==='staff'? 'limegreen' : (ent.status==='recovered'? 'gray': COLORS.sus)); const size = ent.type==='staff'?10:(ent.status==='infected'?8:6); entCtx.arc(p.x,p.y,size,0,Math.PI*2); entCtx.fill(); // glow & pulse
 if(ent.status==='infected' && state.showPulse){ent.pulse = (ent.pulse||0) - 0.02; if(ent.pulse<0) ent.pulse=1; const r=30*ent.pulse; entCtx.beginPath(); entCtx.strokeStyle='rgba(255,0,51,'+ent.pulse*0.6+')'; entCtx.lineWidth=2; entCtx.arc(p.x,p.y,r,0,Math.PI*2); entCtx.stroke(); }
 // highlights
 if(ent.highlight && Date.now()-ent.highlight.since<2000){entCtx.beginPath();entCtx.strokeStyle='orange';entCtx.lineWidth=3;entCtx.arc(p.x,p.y,size+6,0,Math.PI*2);entCtx.stroke();}
});}
function toCanvas(x,y){const rect=floorWrap.getBoundingClientRect();return {x:(x/1200)*rect.width,y:(y/720)*rect.height};}

/* Movement helpers */
function moveToward(ent,target,speed){if(!target) return;const dx=target.x-ent.x, dy=target.y-ent.y;const d=Math.hypot(dx,dy)||1;const step=Math.min(d,speed*(1/60));ent.x += dx/d*step;ent.y += dy/d*step;}
function getPatrolTarget(ent){if(!ent.target || Math.hypot(ent.target.x-ent.x,ent.target.y-ent.y)<4) ent.target = randomInZone(ent.zone); return ent.target;}
function randomStay(ent){if(!ent.target || Math.random()<0.01) ent.target = randomInZone(ent.zone); return ent.target;}

/* Particles */
function triggerParticles(ent){if(!ent) return;const p=toCanvas(ent.x,ent.y);const parts=[];for(let i=0;i<3+Math.floor(Math.random()*3);i++){parts.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:0.6+Math.random()*0.6,size:2+Math.random()*3})}const iv=setInterval(()=>{entCtx.save();entCtx.globalCompositeOperation='lighter';entCtx.clearRect(0,0,entityCanvas.width,entityCanvas.height);parts.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life-=0.05;entCtx.fillStyle=COLORS.magenta;entCtx.globalAlpha=pt.life;entCtx.beginPath();entCtx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);entCtx.fill();});entCtx.restore();parts = parts.filter(p=>p.life>0);if(parts.length===0) clearInterval(iv);},33);} 

/* Charts & UI */
const chartCtx=document.getElementById('chart').getContext('2d');const chart=new Chart(chartCtx,{type:'line',data:{labels:[],datasets:[{label:'Infected',data:[],borderColor:COLORS.red,backgroundColor:'rgba(255,0,51,0.08)',tension:0.2,pointRadius:0},{label:'Projected',data:[],borderColor:'rgba(255,255,255,0.4)',borderDash:[6,6],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
function updateCharts(){const t=new Date().toLocaleTimeString();chart.data.labels.push(t);chart.data.datasets[0].data.push(Object.values(state.entities).filter(e=>e.status==='infected').length);chart.data.labels = chart.data.labels.slice(-1440);chart.data.datasets.forEach(ds=>ds.data = ds.data.slice(-1440));chart.update();}
setInterval(updateCharts,2000);

/* UI render helpers */
function renderTimeline(){const el=document.getElementById('timeline');el.innerHTML='';state.timeline.slice(0,20).forEach(it=>{const d=document.createElement('div');d.style.padding='6px';d.style.borderRadius='6px';d.style.background='rgba(255,255,255,0.02)';d.innerText=it.text;el.appendChild(d);});}
function zoneStats(z){const list=Object.values(state.entities).filter(e=>e.zone===z);return {total:list.length,infected:list.filter(e=>e.status==='infected').length};}
function renderZoneBreakdown(){const el=document.getElementById('zoneBreak');el.innerHTML='';ZONES.forEach(z=>{const s=zoneStats(z);const div=document.createElement('div');div.innerText=`${z}: ${s.infected}/${s.total} (${s.total?Math.round(s.infected/s.total*100):0}%)`;el.appendChild(div)})}
function renderZoneButtons(){const el=document.getElementById('zoneBtns');el.innerHTML='';ZONES.forEach(z=>{const b=document.createElement('button');b.className='btn';b.innerText=z;b.onclick=()=>{if(state.quarantined.has(z))state.quarantined.delete(z);else state.quarantined.add(z);renderZoneButtons();};if(state.quarantined.has(z)){b.style.background='linear-gradient(90deg,var(--red),#ff5577)';b.style.color='#fff'}el.appendChild(b)})}
function renderIsoRec(){const el=document.getElementById('isoRec');el.innerHTML='';(state.algoLast?.isolation_zones||Array.from(state.quarantined)).forEach(z=>{const b=document.createElement('button');b.className='btn-danger';b.innerText='ISOLATE '+z;el.appendChild(b)})}

/* Algo recompute R */
function recomputeR(){const recent=state.contacts.filter(c=>Date.now()-c.t<60000);const infectedIds=Object.values(state.entities).filter(e=>e.status==='infected').length||1;const transmissions=recent.filter(c=>{const a=state.entities[c.a],b=state.entities[c.b];return a&&b&&a.status==='infected'&&b.status!=='infected'}).length;state.r = +(transmissions/infectedIds).toFixed(2);document.getElementById('rVal').innerText = state.r.toFixed(2);updateAlertUI();}
function updateAlertUI(){const pct = Object.values(state.entities).filter(e=>e.status==='infected').length/(Object.keys(state.entities).length||1);const el=document.getElementById('alertStatus');if(state.r<1 && pct<0.5){el.innerText='System Normal';el.style.background='rgba(0,255,255,0.04)'}else if(state.r>=1 && state.r<1.5 && pct<0.5){el.innerText='Monitor Escalation';el.style.background='rgba(255,240,140,0.06)'}else{el.innerText='OUTBREAK ALERT';el.style.background='linear-gradient(90deg,var(--red),#ff5577)';document.querySelector('.app').classList.add('pulse-flash');setTimeout(()=>document.querySelector('.app').classList.remove('pulse-flash'),3000)}}

/* Controls wiring */
document.getElementById('playPause').onclick=()=>{state.paused=!state.paused;document.getElementById('playPause').innerText=state.paused?'Resume':'Pause'};document.getElementById('speed').oninput=e=>{state.speed=Number(e.target.value);document.getElementById('speedLabel').innerText=state.speed.toFixed(1)+'x'};document.getElementById('transRate').oninput=e=>{state.transRate=Number(e.target.value);document.getElementById('trLabel').innerText=state.transRate+'%'};document.getElementById('reset').onclick=()=>{state.entities={};state.contacts=[];state.timeline=[];renderZoneButtons();renderIsoRec();}
document.getElementById('inject').onclick=()=>{const id=prompt('Node id to inject (e.g., Patient_01)');if(!id) return;publish('icu/alert/manual',{source:id,t:Date.now()});ensureEntity(id,'patient','ICU').status='infected';recomputeR();flashAlert();}

/* Publish helper */
function publish(topic,obj){if(mqttClient && mqttConnected){const m=new Paho.MQTT.Message(JSON.stringify(obj));m.destinationName=topic;m.qos=0;m.retained=false;mqttClient.send(m);}else console.warn('mqtt not connected')}

/* Utils */
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function lerpColor(a,b,t){const A=hexToRgb(a),B=hexToRgb(b);return rgbToHex(Math.round(A.r+(B.r-A.r)*t),Math.round(A.g+(B.g-A.g)*t),Math.round(A.b+(B.b-A.b)*t));}
function hexToRgb(hex){const v=hex.replace('#','');return {r:parseInt(v.slice(0,2),16),g:parseInt(v.slice(2,4),16),b:parseInt(v.slice(4,6),16)}}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}

/* Demo seed if no mqtt */
function seedDemo(){const ids=['Patient_01','Patient_02','Patient_03','Dr_Mehta','Nurse_Priya'];const zones=['ICU','ICU','WardA','ICU','Emergency'];ids.forEach((id,i)=>{const pos=randomInZone(zones[i]);state.entities[id]={id,type:id.startsWith('Dr')||id.startsWith('Nurse')?'staff':'patient',status:i===0?'infected':'susceptible',zone:zones[i],x:pos.x,y:pos.y,trail:[],target:null,pulse: i===0?1:0};});state.infected=1;}

/* Start */
renderZoneButtons();renderIsoRec();seedDemo();connectMQTT('localhost',1883);
</script>
